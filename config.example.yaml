# OPanel Configuration
# Copy this file to /etc/opanel/config.yaml and edit as needed

server:
  host: "0.0.0.0"
  port: 8443

database:
  path: "/opt/opanel/db/opanel.db"

jwt:
  secret: "CHANGE THIS TO A RANDOM SECRET IN PRODUCTION - use: openssl rand -hex 32"
  expiry_hours: 24
  refresh_days: 30

admin:
  username: "admin"
  password: "admin"
  email: "admin@localhost"

paths:
  vhosts_dir: "/var/www/vhosts"
  templates_dir: "/opt/opanel/templates"
  sshd_config: "/etc/ssh/sshd_config"
  nginx_conf_dir: "/etc/nginx/sites-enabled"

system:
  opanel_group: "opanel_users"
  php_version: "8.2"
