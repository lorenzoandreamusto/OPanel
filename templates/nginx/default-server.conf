# OPanel Default Nginx Configuration
# Catch-all server block for unmatched domains

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html;
    index index.html;

    location / {
        return 404 "Site not configured. Add a domain from OPanel panel.\n";
    }
}
